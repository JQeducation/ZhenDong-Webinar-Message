<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在為您跳轉至官方 LINE...</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f9f9f9; }
        .container { text-align: center; padding: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #06c755; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #555; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <p>正在為您準備講座連結，請稍候...</p>
    </div>

    <script>
        // --- 🚩 設定區 🚩 ---
        const MyLiffId = '2009771736-ooOyR8hn'; // 你的 GitHub 專用 LIFF ID
        const MakeWebhookUrl = 'https://hook.us2.make.com/ht42nif6a997vu5pn9wckhm5i1x6a638'; // Step 2 的 Webhook
        const Super8Link = 'https://s.no8.io/link/channels/oNIint5Dor'; // 你的 Super8 超連結
        // --- 🚩 設定結束 🚩 ---

        async function main() {
            try {
                // 1. 初始化 LIFF
                await liff.init({ liffId: MyLiffId });

                // 2. 檢查是否登入
                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }

                // 3. 抓取 LINE Profile
                const profile = await liff.getProfile();

                // 4. 從網址列抓取 Email 參數
                const searchParams = new URLSearchParams(window.location.search);
                const userEmail = searchParams.get('email');

                // 5. 將資料傳送給 Make Step 2
                // 我們使用 fetch 發送 POST 請求
                await fetch(MakeWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'no-cors', // 避免 CORS 報錯阻礙跳轉
                    body: JSON.stringify({
                        line_id: profile.userId,
                        email: userEmail,
                        display_name: profile.displayName,
                        source: "github_redirect"
                    })
                });

                // 6. 成功傳送後，立刻跳轉到 Superlink
                // 延遲 500ms 確保請求已發出
                setTimeout(() => {
                    window.location.href = Super8Link;
                }, 500);

            } catch (error) {
                console.error('發生錯誤:', error);
                // 即使出錯也嘗試跳轉，避免使用者卡住
                window.location.href = Super8Link;
            }
        }

        // 啟動執行
        main();
    </script>
</body>
</html>
