<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在為您跳轉至官方 LINE...</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f9f9f9; }
        .container { text-align: center; padding: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #06c755; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #555; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <p>正在為您準備講座連結，請稍候...</p>
    </div>

    <script>
        // --- 🚩 設定區 🚩 ---
        const MyLiffId = '2009771736-ooOyR8hn'; // 確保 O 為大寫
        const MakeWebhookUrl = 'https://hook.us2.make.com/ht42nif6a997vu5pn9wckhm5i1x6a638'; 
        const Super8Link = 'https://s.no8.io/link/channels/oNIint5Dor'; 
        // --- 🚩 設定結束 🚩 ---

        let isProcessing = false; // 防止重複執行的旗標

        async function main() {
            // 如果已經在處理中，就直接跳出
            if (isProcessing) return;

            try {
                // 1. 初始化 LIFF
                await liff.init({ liffId: MyLiffId });

                // 2. 檢查是否登入
                if (!liff.isLoggedIn()) {
                    // 不帶 redirectUri，讓 LIFF 自動處理回傳路徑，減少電腦端出錯率
                    liff.login(); 
                    return;
                }

                // 標記為處理中，避免後續重複執行
                isProcessing = true;

                // 3. 抓取 LINE Profile
                const profile = await liff.getProfile();

                // 4. 從網址列抓取 Email 參數
                const searchParams = new URLSearchParams(window.location.search);
                const userEmail = searchParams.get('email');

                // 5. 將資料傳送給 Make Step 2
                // 我們不使用 await，讓它在背景發送後直接執行跳轉，減少等待感
                fetch(MakeWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'no-cors', 
                    body: JSON.stringify({
                        line_id: profile.userId,
                        email: userEmail,
                        display_name: profile.displayName,
                        source: "github_redirect"
                    })
                });

                // 6. 成功發送請求後，立刻跳轉到 Superlink
                // 使用 replace 替換目前紀錄，防止使用者按返回鍵回到此頁
                setTimeout(() => {
                    window.location.replace(Super8Link);
                }, 300);

            } catch (error) {
                console.error('發生錯誤:', error);
                // 即使出錯也強迫跳轉，確保使用者不卡住
                window.location.replace(Super8Link);
            }
        }

        // 啟動執行
        main();
    </script>
</body>
</html>
