<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在為您跳轉至官方 LINE...</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f9f9f9; }
        .container { text-align: center; padding: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #06c755; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #555; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <p>正在為您準備講座連結，請稍候...</p>
    </div>

    <script>
        const MyLiffId = '2009771736-ooOyR8hn'; 
        const MakeWebhookUrl = 'https://hook.us2.make.com/ht42nif6a997vu5pn9wckhm5i1x6a638'; 
        const Super8Link = 'https://s.no8.io/link/channels/oNIint5Dor'; 

        let isProcessing = false;

        async function main() {
            if (isProcessing) return;

            try {
                await liff.init({ liffId: MyLiffId });

                if (!liff.isLoggedIn()) {
                    liff.login(); 
                    return;
                }

                isProcessing = true;

                const profile = await liff.getProfile();
                const searchParams = new URLSearchParams(window.location.search);
                const userEmail = searchParams.get('email');

                // 核心改動：等待 fetch 完成，並移除 no-cors
                await fetch(MakeWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        line_id: profile.userId,
                        email: userEmail,
                        display_name: profile.displayName,
                        source: "github_redirect"
                    })
                });

                // 資料確定發出後，稍停 500ms 讓伺服器反應，然後跳轉
                setTimeout(() => {
                    window.location.replace(Super8Link);
                }, 500);

            } catch (error) {
                console.error('發生錯誤:', error);
                // 出錯時保底跳轉
                window.location.replace(Super8Link);
            }
        }

        main();
    </script>
</body>
</html>
